# parking-bridge riêng — ảnh trong Docker volume, không cần 20252B-digital-twin trên máy.
# Trước đó chạy pipeline từ doker- (KHÔNG start parking-bridge ở đó):
#   cd doker- && docker compose up -d mqtt-broker postgres-sink camera-device
services:
  dataset-init:
    image: minh333/parking-camera-device:latest
    container_name: parking-dataset-init
    volumes:
      - parking-dataset:/data/dataset
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -d /data/dataset/images ] || [ -z "$$(ls -A /data/dataset/images 2>/dev/null)" ]; then
          echo "Seeding parking-dataset from camera image..."
          mkdir -p /data/dataset
          cp -a /app/data/content/dataset/. /data/dataset/
        else
          echo "parking-dataset already seeded."
        fi
    restart: "no"

  parking-bridge:
    build: ./server
    container_name: parking-bridge
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      dataset-init:
        condition: service_completed_successfully
    env_file:
      - ./server/.env
    environment:
      MQTT_HOST: host.docker.internal
      FRAMES_DATASET_PATH: /data/dataset
    volumes:
      - parking-dataset:/data/dataset:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  parking-dataset:
    name: parking-dataset
