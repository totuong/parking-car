# Chỉ chạy parking-bridge. Stack đầy đủ: doker-/docker-compose.yml
services:
  parking-bridge:
    build: ./server
    container_name: parking-bridge
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./server/.env
    environment:
      MQTT_HOST: host.docker.internal
      FRAMES_DATASET_PATH: /data/dataset
    volumes:
      - parking-dataset:/data/dataset:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  parking-dataset:
    name: parking-dataset
